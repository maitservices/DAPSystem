<div class="bg-white rounded-lg shadow border p-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-gray-800">Detalhes da Empresa (PJ)</h2>
        
        <div>
            <button ng-show="!isEditing" ng-click="habilitarEdicao()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition">
                ✏️ Editar
            </button>
            <button ng-show="isEditing" ng-click="salvarDados()" 
                    class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded transition">
                💾 Salvar
            </button>
        </div>
    </div>

    <form name="clienteForm" novalidate>
        <fieldset ng-disabled="!isEditing" class="grid grid-cols-1 md:grid-cols-2 gap-6 disabled:opacity-75">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Razão Social *</label>
                <input type="text" ng-model="cliente.razao_social" required 
                       class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 disabled:bg-gray-100">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome Fantasia *</label>
                <input type="text" ng-model="cliente.nome_fantasia" required 
                       class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 disabled:bg-gray-100">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">CNPJ *</label>
                <input type="text" ng-model="cliente.cnpj" required 
                       class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 disabled:bg-gray-100">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Inscrição Estadual *</label>
                <input type="text" ng-model="cliente.inscricao_estadual" required 
                       class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 disabled:bg-gray-100">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome Sócio Majoritário</label>
                <input type="text" ng-model="cliente.socio_majoritario" 
                       class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 disabled:bg-gray-100">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">E-mail *</label>
                <input type="email" ng-model="cliente.email" required 
                       class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 disabled:bg-gray-100">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Whatsapp Responsável *</label>
                <input type="text" ng-model="cliente.whatsapp" required 
                       class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 disabled:bg-gray-100">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Descrição das atividades da empresa</label>
                <textarea ng-model="cliente.descricao_atividades" rows="3" 
                          class="w-full border-gray-300 rounded-md shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 disabled:bg-gray-100"></textarea>
            </div>
        </fieldset>
    </form>
</div>
